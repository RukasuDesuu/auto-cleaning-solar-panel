name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
        cache-dependency-path: "firmware/dashboard/uv.lock"

    - name: Set up Python
      run: uv python install

    - name: Install dependencies
      run: |
        cd firmware/dashboard
        uv sync --all-extras --dev

    - name: Run Ruff (Lint & Format)
      run: |
        cd firmware/dashboard
        uv run ruff check .
        uv run ruff format --check .

    - name: Run Pyright (Type Check)
      run: |
        cd firmware/dashboard
        uv run pyright .

    - name: Run Pytest
      run: |
        cd firmware/dashboard
        PYTHONPATH=. uv run pytest
